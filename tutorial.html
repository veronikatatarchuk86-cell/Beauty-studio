<body class="color-change-2x">
    <div class="backdrop is-hidden" data-modal>
        <div class="modal tutorial-modal-mobile">
            <button class="btn" data-modal-close>x</button>
            <form class="form_modal">
                <label class="book">
                    First name
                    <input class="box" type="text" name="firstName" placeholder="Exapmle: Monika" autofocus />
                </label>
                <label class="book">
                    Last name
                    <input class="box" type="text" name="lastName" placeholder="Example: Smith" />
                </label>
                <label class="book">
                    Phone number
                    <input class="box" type="tel" name="phone" placeholder="Example: +1 ### ###-####" />
                </label>
                <label class="book">
                    Email
                    <input class="box" type="email" name="email" placeholder="Example: monika@gmail.com" />
                </label>

                <label class="book" for="month">Lessons</label>
                <select class="box" name="month" id="month">
                    <optgroup label="Online">
                        <option value="s6">Makeup</option>
                        <option value="s7">Haircuts</option>
                        <option value="s8">Nails</option>
                        <option value="s8">Brow and Lashes</option>
                    </optgroup>

                    <optgroup label="Ofline">
                        <option value="s9">Makeup</option>
                        <option value="s10">Haircuts</option>
                        <option value="s11">Nails</option>
                        <option value="s8">Brow and Lashes</option>
                    </optgroup>
                </select>
                <label class="book">
                    Date and time
                    <input class="box" type="datetime-local" />
                </label>
                <label class="book">
                    Message
                    <textarea class="box textarea" name="feedback" rows="5"
                        placeholder="Enter your message here..."></textarea>
                </label>
                <br>
                <div class="container_submit"><button class="submit_button" type="submit">Order</button></div>
            </form>
        </div>
    </div>
